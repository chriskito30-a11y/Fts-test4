<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Calendrier — Fais Ton Show</title>
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/fts.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
.auth-loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}.spinner{width:24px;height:24px;border:2px solid #333;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.admin-shell{display:none}.topbar{background:var(--grey2);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}.logo{font-family:var(--font-display);font-size:1.5rem}.logo span{color:var(--red)}.sub{font-size:.65rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}.actions{display:flex;gap:.5rem;flex-wrap:wrap}.btn-sm{width:auto;font-family:var(--font-body);font-size:.76rem;letter-spacing:0;padding:.55rem .9rem}.btn-dark{background:#242424}.btn-dark:hover{background:#303030}.layout{max-width:1100px;margin:0 auto;padding:1.5rem}.grid{display:grid;grid-template-columns:340px 1fr;gap:1rem}.card-admin{background:var(--grey);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem}.mini-title{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}.event-list{display:flex;flex-direction:column;gap:.45rem;max-height:72vh;overflow:auto}.evt-row{display:flex;align-items:flex-start;gap:.7rem;background:#141414;border:1px solid var(--border);border-radius:var(--r-sm);padding:.75rem .85rem;cursor:pointer}.evt-row:hover,.evt-row.sel{border-color:var(--red);background:rgba(212,32,26,.08)}.evt-date{min-width:52px;text-align:center;border:1px solid rgba(201,168,76,.22);border-radius:var(--r-sm);padding:.35rem .25rem;color:var(--gold);background:rgba(201,168,76,.06)}.evt-day{font-family:var(--font-display);font-size:1.25rem;line-height:1}.evt-month{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase}.evt-info{flex:1;min-width:0}.evt-name{font-size:.9rem;color:var(--white);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.evt-meta{font-size:.68rem;color:var(--muted);line-height:1.45;margin-top:.18rem}.evt-off{opacity:.45}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}.field{margin-bottom:.85rem}.field label{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}.field input,.field textarea,.field select{background:#0e0e0e;color:var(--white);font-size:.86rem}.field textarea{min-height:90px}.full{grid-column:1/-1}.row-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem}.msg{display:none;margin:.8rem 0 0;padding:.75rem 1rem;border-radius:var(--r-sm);font-size:.8rem}.msg.ok{display:block;background:rgba(50,120,50,.15);border:1px solid #2a5a2a;color:#6aba6a}.msg.err{display:block;background:rgba(212,32,26,.1);border:1px solid rgba(212,32,26,.3);color:#e07070}.danger{border-color:#5a2020;color:#aa6060;background:transparent}.danger:hover{background:rgba(212,32,26,.1);color:var(--red)}.hint{font-size:.72rem;color:var(--muted);line-height:1.55}.empty{color:var(--muted);font-size:.82rem;padding:1rem 0;font-style:italic}.status-pill{display:inline-block;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;border-radius:2px;padding:.15rem .45rem;margin-left:.4rem}.status-on{background:rgba(50,120,50,.14);border:1px solid #2a5a2a;color:#6aba6a}.status-off{background:rgba(212,32,26,.1);border:1px solid rgba(212,32,26,.3);color:#e07070}@media(max-width:820px){.topbar{align-items:flex-start;flex-direction:column}.grid,.form-grid{grid-template-columns:1fr}.event-list{max-height:none}.full{grid-column:auto}}
</style>
</head>
<body class="has-glow">
<div class="auth-loading" id="auth-loading"><div class="logo">ADMIN <span>CALENDRIER</span></div><div class="spinner"></div><div class="sub">Vérification accès admin…</div></div>
<div class="admin-shell" id="admin-shell">
  <div class="topbar">
    <div><div class="logo">ADMIN <span>CALENDRIER</span></div><div class="sub">Événements affichés dans l’espace membres</div></div>
    <div class="actions">
      <a class="btn btn-sm btn-dark" href="membres.html">Membres</a>
      <a class="btn btn-sm btn-dark" href="contenus-admin.html">Admin contenus</a>
      <a class="btn btn-sm btn-dark" href="saison-admin.html">Admin saison</a>
      <button class="btn-outline" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="layout">
    <div class="grid">
      <div class="card-admin">
        <div class="mini-title">Événements Firebase</div>
        <div class="event-list" id="event-list"><div class="empty">Chargement…</div></div>
        <button class="btn-gold" style="margin-top:.8rem" onclick="newEvent()">+ Ajouter un événement</button>
        <p class="hint" style="margin-top:.8rem">Source officielle V1 : <strong>fts_events</strong>. Cette page remplace l’ancien calendrier Google Sheets.</p>
      </div>

      <div class="card-admin">
        <div class="mini-title">Éditer un événement</div>
        <input type="hidden" id="e-key">
        <div class="form-grid">
          <div class="field full"><label>Nom</label><input id="e-name" placeholder="Ex : Showcase de fin d’année"></div>
          <div class="field"><label>Type</label><input id="e-type" placeholder="Spectacle, stage, répétition…"></div>
          <div class="field"><label>Visible</label><select id="e-active"><option value="true">Oui</option><option value="false">Non</option></select></div>
          <div class="field"><label>Date</label><input id="e-date" type="date"></div>
          <div class="field"><label>Heure</label><input id="e-hour" type="time"></div>
          <div class="field full"><label>Lieu</label><input id="e-location" placeholder="Salle, ville…"></div>
          <div class="field full"><label>Lien inscription / infos</label><input id="e-url" placeholder="https://…"></div>
          <div class="field full"><label>Note interne / description</label><textarea id="e-desc" placeholder="Optionnel — détails utiles pour l’équipe"></textarea></div>
        </div>
        <div class="row-actions">
          <button type="button" class="btn btn-sm" id="btn-save-event">Enregistrer</button>
          <button type="button" class="btn-outline" id="btn-new-event">Nouveau</button>
          <button type="button" class="btn-outline danger" id="btn-delete-event">Supprimer</button>
        </div>
        <div id="msg" class="msg"></div>
      </div>
    </div>
  </div>
</div>
<script src="assets/js/fts-utils.js"></script>
<script src="assets/js/fts-firebase.js"></script>
<script>
let db, auth, events = [], selectedKey = '';
function $(id){ return document.getElementById(id); }
function msg(txt, ok=true){ const el=$('msg'); el.textContent=txt; el.className='msg '+(ok?'ok':'err'); setTimeout(()=>{ el.className='msg'; }, 3200); }
function doLogout(){ firebase.auth().signOut().then(()=>location.href='auth.html'); }

function init(){
  db=FTS.initFirebase();
  auth=firebase.auth();
  auth.onAuthStateChanged(async user=>{
    if(!user){ location.href='auth.html'; return; }
    try{
      const snap=await db.ref('fts_users/'+user.uid).once('value');
      const profile=snap.val();
      if(!profile || profile.role!=='admin'){ location.href='membres.html'; return; }
      $('auth-loading').style.display='none';
      $('admin-shell').style.display='block';
      listenEvents();
      newEvent();
    }catch(e){ console.warn('[FTS Calendrier]', e); location.href='auth.html'; }
  });
}

function listenEvents(){
  db.ref('fts_events').on('value', snap=>{
    events=[];
    if(snap.exists()) snap.forEach(child=>events.push(normalizeEvent(child.key, child.val()||{})));
    events.sort((a,b)=>(a.dateTs||Number.MAX_SAFE_INTEGER)-(b.dateTs||Number.MAX_SAFE_INTEGER)||(a.name||'').localeCompare(b.name||'', 'fr'));
    renderList();
  }, err=>{ console.warn('[FTS Calendrier] events', err); $('event-list').innerHTML='<div class="empty">Impossible de charger les événements.</div>'; });
}

function normalizeEvent(key, v){
  return {
    key,
    name:v.name||v.nom||v.title||v.titre||v.n||'',
    type:v.type||v.t||'',
    active:v.active!==false && v.status!=='inactive',
    date:v.dateIso||v.isoDate||v.dateInput||v.date||'',
    dateLabel:v.dateLabel||v.d||v.date||'',
    hour:v.hour||v.heure||v.time||v.h||'',
    location:v.location||v.lieu||v.l||'',
    url:v.url||v.link||v.lien||v.u||'',
    desc:v.description||v.desc||'',
    dateTs:Number(v.dateTs||v.startTs||v.ts||0),
    updatedAt:v.updatedAt||0
  };
}

function renderList(){
  const el=$('event-list');
  if(!events.length){ el.innerHTML='<div class="empty">Aucun événement. Clique sur “Ajouter un événement”.</div>'; return; }
  el.innerHTML=events.map(e=>{
    const d=e.dateTs?new Date(e.dateTs):null;
    const day=d?String(d.getDate()).padStart(2,'0'):'—';
    const month=d?d.toLocaleDateString('fr-FR',{month:'short'}).replace('.',''):'Date';
    return `<div class="evt-row${selectedKey===e.key?' sel':''}${!e.active?' evt-off':''}" onclick="editEvent('${FTS.esc(e.key)}')">
      <div class="evt-date"><div class="evt-day">${day}</div><div class="evt-month">${FTS.esc(month)}</div></div>
      <div class="evt-info"><div class="evt-name">${FTS.esc(e.name||'Sans nom')}<span class="status-pill ${e.active?'status-on':'status-off'}">${e.active?'Visible':'Masqué'}</span></div><div class="evt-meta">${FTS.esc(e.dateLabel||'Date non renseignée')}${e.hour?' · '+FTS.esc(e.hour):''}${e.location?' · '+FTS.esc(e.location):''}</div></div>
    </div>`;
  }).join('');
}

function newEvent(){
  selectedKey='';
  ['e-key','e-name','e-type','e-date','e-hour','e-location','e-url','e-desc'].forEach(id=>$(id).value='');
  $('e-active').value='true';
  renderList();
}
function editEvent(key){
  const e=events.find(x=>x.key===key); if(!e) return;
  selectedKey=key;
  $('e-key').value=e.key;
  $('e-name').value=e.name||'';
  $('e-type').value=e.type||'';
  $('e-active').value=String(e.active!==false);
  $('e-date').value=isoInputFromEvent(e);
  $('e-hour').value=toInputTime(e.hour||'');
  $('e-location').value=e.location||'';
  $('e-url').value=e.url||'';
  $('e-desc').value=e.desc||'';
  renderList();
}
function isoInputFromEvent(e){
  if(e.date && /^\d{4}-\d{2}-\d{2}$/.test(e.date)) return e.date;
  if(e.dateTs) return new Date(e.dateTs).toISOString().slice(0,10);
  return '';
}
function toInputTime(h){
  const s=String(h||'').trim();
  if(/^\d{2}:\d{2}$/.test(s)) return s;
  const m=s.match(/(\d{1,2})\s*h\s*(\d{2})?/i);
  if(m) return String(m[1]).padStart(2,'0')+':'+(m[2]||'00');
  return '';
}
function frDateLabel(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
}
function dateTs(iso,hour){
  if(!iso) return 0;
  const h=(hour||'00:00').split(':');
  const d=new Date(iso+'T00:00:00');
  d.setHours(Number(h[0]||0), Number(h[1]||0), 0, 0);
  return d.getTime();
}
async function writeEventToFirebase(key, data){
  const updates = {};
  // Chemin officiel V1
  updates['fts_events/' + key] = data;
  // Miroir de compatibilité : utile si vos règles Firebase autorisent déjà fts_content
  updates['fts_content/calendrier/events/' + key] = data;
  try{
    await db.ref().update(updates);
    return 'fts_events';
  }catch(primaryErr){
    console.warn('[FTS Calendrier] Écriture groupée impossible, tentative compatibilité', primaryErr);
    // Fallback volontaire : certaines règles existantes peuvent autoriser fts_content mais pas encore fts_events.
    await db.ref('fts_content/calendrier/events/' + key).set(data);
    return 'fts_content/calendrier/events';
  }
}

function setSaving(isSaving){
  const btn = $('btn-save-event');
  if(!btn) return;
  btn.disabled = !!isSaving;
  btn.textContent = isSaving ? 'Enregistrement…' : 'Enregistrer';
}

async function saveEvent(){
  setSaving(true);
  const name=$('e-name').value.trim();
  const iso=$('e-date').value;
  const hour=$('e-hour').value;
  if(!name){ setSaving(false); msg('Nom requis', false); return; }
  if(!iso){ setSaving(false); msg('Date requise', false); return; }
  const key=$('e-key').value || db.ref('fts_events').push().key;
  const active=$('e-active').value==='true';
  const data={
    name,
    title:name,
    n:name,
    type:$('e-type').value.trim(),
    t:$('e-type').value.trim(),
    active,
    status:active?'active':'inactive',
    dateIso:iso,
    date:frDateLabel(iso),
    dateLabel:frDateLabel(iso),
    d:frDateLabel(iso),
    hour,
    h:hour,
    location:$('e-location').value.trim(),
    l:$('e-location').value.trim(),
    url:$('e-url').value.trim(),
    u:$('e-url').value.trim(),
    description:$('e-desc').value.trim(),
    dateTs:dateTs(iso,hour),
    updatedAt:Date.now()
  };
  if(!$('e-key').value) data.createdAt=Date.now();
  try{
    const writtenPath = await writeEventToFirebase(key, data);
    selectedKey=key; $('e-key').value=key;
    msg(writtenPath === 'fts_events' ? 'Événement enregistré' : 'Événement enregistré dans le calendrier compatible');
  }catch(e){
    console.error('[FTS Calendrier] Enregistrement impossible', e);
    msg('Enregistrement impossible : ' + (e && e.message ? e.message : String(e)), false);
  }finally{
    setSaving(false);
  }
}
async function deleteEvent(){
  const key=$('e-key').value;
  if(!key){ msg('Sélectionne un événement à supprimer', false); return; }
  if(!confirm('Supprimer définitivement cet événement ?')) return;
  try{
    await db.ref().update({
      ['fts_events/' + key]: null,
      ['fts_content/calendrier/events/' + key]: null
    });
    newEvent();
    msg('Événement supprimé');
  }catch(e){
    console.error('[FTS Calendrier] Suppression impossible', e);
    msg('Suppression impossible : ' + (e && e.message ? e.message : String(e)), false);
  }
}

window.addEventListener('DOMContentLoaded', function(){
  $('btn-save-event')?.addEventListener('click', function(e){ e.preventDefault(); saveEvent(); });
  $('btn-new-event')?.addEventListener('click', function(e){ e.preventDefault(); newEvent(); });
  $('btn-delete-event')?.addEventListener('click', function(e){ e.preventDefault(); deleteEvent(); });
});

init();
</script>
</body>
</html>
