<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="application-name" content="Fais Ton Show">
<meta name="apple-mobile-web-app-title" content="Fais Ton Show">
<meta name="theme-color" content="#000000">
  
<title>Connexion — Fais Ton Show</title>
<meta name="description" content="Connecte-toi à l'espace membres de Fais Ton Show.">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/fts.css?v=14">

<style>
html, body { height: 100%; }

.auth-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}

/* ── LOGO ── */
.auth-logo {
  text-align: center;
  margin-bottom: 2rem;
  animation: fadeUp .5s ease both;
}
.auth-logo-title {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 8vw, 4rem);
  letter-spacing: .04em;
  line-height: .95;
}
.auth-logo-title span { color: var(--red); }
.auth-logo-sub {
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: .5rem;
}

/* ── CARD ── */
.auth-card {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--r-lg);
  backdrop-filter: blur(8px);
  overflow: hidden;
  animation: fadeUp .5s .1s ease both;
}

/* ── ONGLETS ── */
.auth-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.auth-tab {
  padding: .9rem;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: .82rem;
  cursor: pointer;
  transition: all .2s;
}
.auth-tab.active    { color: var(--white); border-bottom-color: var(--red); }
.auth-tab:hover:not(.active) { color: var(--white); background: rgba(255,255,255,.02); }

/* ── CORPS ── */
.auth-body { padding: 1.8rem; }

.auth-form         { display: none; }
.auth-form.active  { display: block; animation: fadeUp .3s ease both; }

.f-label {
  display: block;
  font-size: .65rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .35rem;
  margin-top: 1rem;
}
.f-label:first-child { margin-top: 0; }

.two-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .8rem;
}

/* ── MOT DE PASSE OUBLIÉ ── */
.forgot-link {
  font-size: .72rem;
  color: var(--muted);
  text-align: right;
  margin-top: .35rem;
  cursor: pointer;
  transition: color .2s;
  user-select: none;
}
.forgot-link:hover { color: var(--gold); }

/* ── PILLS DISCIPLINES ── */
.disc-grid {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem;
  margin-top: .4rem;
}

/* ── ÉCRAN EN ATTENTE ── */
.pending-screen {
  display: none;
  text-align: center;
  padding: 2.5rem 1.8rem;
  animation: fadeUp .4s ease both;
}
.pending-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  animation: fadeIn .4s ease both;
}
.pending-title {
  font-family: var(--font-display);
  font-size: 2rem;
  letter-spacing: .03em;
  margin-bottom: .6rem;
}
.pending-desc {
  font-size: .82rem;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}
.pending-email {
  display: inline-block;
  font-size: .75rem;
  color: var(--gold);
  background: rgba(201,168,76,.08);
  border: 1px solid rgba(201,168,76,.2);
  border-radius: var(--r-sm);
  padding: .3rem .8rem;
  margin-bottom: 1rem;
}

/* ── SUBMIT ── */
.auth-submit { margin-top: 1.4rem; }

/* ── FOOTER ── */
.auth-footer {
  text-align: center;
  font-size: .65rem;
  color: #333;
  margin-top: 1.5rem;
}
.auth-footer a { color: #444; text-decoration: none; transition: color .2s; }
.auth-footer a:hover { color: var(--muted); }

/* ── LOADING STATE ── */
.btn.loading { opacity: .6; cursor: not-allowed; }
/* Correctif PWA Android — clavier sur auth */
html, body {
  min-height: 100%;
  height: auto;
  overflow-x: hidden;
  overflow-y: auto;
}
body {
  -webkit-user-select: auto;
  user-select: auto;
}
.auth-wrap {
  min-height: 100dvh;
  padding-bottom: calc(2rem + env(safe-area-inset-bottom));
}
.auth-card, .auth-body, .auth-form {
  touch-action: manipulation;
}
.auth-card input,
.auth-card textarea,
.auth-card select {
  position: relative;
  z-index: 2;
  font-size: 16px !important;
  -webkit-user-select: text;
  user-select: text;
  touch-action: manipulation;
  caret-color: var(--gold);
}
.auth-card input:focus,
.auth-card textarea:focus,
.auth-card select:focus {
  outline: none;
  border-color: var(--red);
  box-shadow: 0 0 0 2px rgba(212,32,26,.12);
}
@media (max-width: 560px) {
  .auth-wrap {
    justify-content: flex-start;
    padding-top: max(1.2rem, env(safe-area-inset-top));
  }
  .auth-logo { margin-bottom: 1.2rem; }
}

</style>
</head>

<body class="has-noise has-glow">
<div class="auth-wrap">

  <!-- LOGO -->
  <div class="auth-logo">
    <div class="auth-logo-title">FAIS TON <span>SHOW</span></div>
    <div class="auth-logo-sub">École des arts de la scène</div>
  </div>

  <!-- CARD -->
  <div class="auth-card" id="auth-card">

    <!-- ÉCRAN EN ATTENTE DE VALIDATION -->
    <div class="pending-screen" id="pending-screen">
      <div class="pending-icon">⏳</div>
      <div class="pending-title">Demande envoyée !</div>
      <div class="pending-desc">
        Ton compte est en cours de validation par l'équipe FTS.<br>
        Tu recevras un e-mail dès que ton accès sera activé.
      </div>
      <div class="pending-email" id="pending-email-display"></div>
      <button class="btn-outline" style="width:100%;justify-content:center"
        onclick="doSignOut()">← Déconnexion</button>
    </div>

    <!-- ONGLETS -->
    <div class="auth-tabs" id="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">S'inscrire</button>
    </div>

    <div class="auth-body" id="auth-body">

      <!-- ── CONNEXION ── -->
      <div class="auth-form active" id="form-login">

        <label class="f-label">Adresse e-mail</label>
        <input type="email" id="l-email" placeholder="ton@email.fr"
          autocomplete="email" oninput="clearErr('l')">

        <label class="f-label">Mot de passe</label>
        <input type="password" id="l-pwd" placeholder="••••••••"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()"
          oninput="clearErr('l')">

        <div class="forgot-link" onclick="doResetPwd()">Mot de passe oublié ?</div>

        <label class="remember-row" for="l-remember" style="justify-content:flex-start;margin-top:.8rem">
          <input type="checkbox" id="l-remember">
          <div class="remember-box"></div>
          <span class="remember-label">Se souvenir de moi</span>
        </label>

        <div class="inline-error" id="l-err"></div>
        <div class="msg-success" id="l-ok" style="display:none"></div>

        <button class="btn auth-submit" id="btn-login" onclick="doLogin()">
          Se connecter
        </button>

      </div><!-- /form-login -->

      <!-- ── INSCRIPTION ── -->
      <div class="auth-form" id="form-register">

        <div class="two-cols">
          <div>
            <label class="f-label" style="margin-top:0">Prénom</label>
            <input type="text" id="r-first" placeholder="Léa"
              autocomplete="given-name" oninput="clearErr('r')">
          </div>
          <div>
            <label class="f-label" style="margin-top:0">Nom</label>
            <input type="text" id="r-last" placeholder="Martin"
              autocomplete="family-name" oninput="clearErr('r')">
          </div>
        </div>

        <label class="f-label">Adresse e-mail</label>
        <input type="email" id="r-email" placeholder="ton@email.fr"
          autocomplete="email" oninput="clearErr('r')">

        <label class="f-label">Mot de passe</label>
        <input type="password" id="r-pwd" placeholder="8 caractères minimum"
          autocomplete="new-password"
          onkeydown="if(event.key==='Enter') doRegister()"
          oninput="clearErr('r')">

        <label class="f-label">Discipline(s) pratiquée(s) <span style="color:#555;text-transform:none;letter-spacing:0">(optionnel)</span></label>
        <div class="disc-grid" id="disc-grid"></div>

        <div class="inline-error" id="r-err"></div>

        <button class="btn auth-submit" id="btn-register" onclick="doRegister()">
          Créer mon compte
        </button>

      </div><!-- /form-register -->

    </div><!-- /auth-body -->
  </div><!-- /auth-card -->

  <div class="auth-footer">
    Fais Ton Show · <a href="index.html">Retour à l'accueil</a>
  </div>

</div><!-- /auth-wrap -->


<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Utilitaires FTS -->
<script src="assets/js/fts-utils.js"></script>
<script src="assets/js/fts-firebase.js"></script>

<script>
/* ================================================================
   AUTH.JS — Connexion / Inscription Firebase
   Email/Mot de passe + profil RTDB + gestion rôles
   ================================================================ */

const ADMIN_EMAIL = "contact@faistonshow.fr";

const DISCIPLINES = [
  { id:"Theatre",          icon:"🎭", label:"Théâtre" },
  { id:"Chant",            icon:"🎤", label:"Chant" },
  { id:"Danse",            icon:"💃", label:"Danse" },
  { id:"Musique",          icon:"🎸", label:"Musique" },
  { id:"Singer Academy",   icon:"⭐", label:"Singer Academy" },
  { id:"Comedie Musicale", icon:"🎬", label:"Comédie Musicale" },
  { id:"Singer Show",      icon:"🌟", label:"Singer Show" },
  { id:"Atelier",          icon:"🎨", label:"Atelier" },
];

let db, auth;
let selectedDisc = new Set();

/* ── INIT ──────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {

  db   = FTS.initFirebase();
  auth = firebase.auth();

  // Construction des pills de disciplines
  document.getElementById('disc-grid').innerHTML = DISCIPLINES.map(d =>
    `<div class="pill" data-id="${d.id}" onclick="toggleDisc(this,'${FTS.esc(d.id)}')">
      ${d.icon} ${FTS.esc(d.label)}
    </div>`
  ).join('');

  // Écoute de l'état de connexion
  auth.onAuthStateChanged(async user => {
    if (!user) return; // pas connecté → reste sur la page

    try {
      const snap    = await db.ref('fts_users/' + user.uid).once('value');
      const profile = snap.val();

      if (!profile) {
        // Profil introuvable → déconnexion propre
        await auth.signOut();
        return;
      }

      if (profile.status === 'pending') {
        showPendingScreen(user.email);
        return;
      }

      if (profile.status === 'active') {
        window.location.href = 'membres.html';
      }

    } catch(e) {
      console.warn('[FTS Auth] Erreur lecture profil :', e);
    }
  });
});

/* ── NAVIGATION ONGLETS ────────────────────────────────────────── */
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  document.getElementById('form-login').classList.toggle('active', isLogin);
  document.getElementById('form-register').classList.toggle('active', !isLogin);
  clearErr('l');
  clearErr('r');
}

/* ── PILLS DISCIPLINES ─────────────────────────────────────────── */
function toggleDisc(el, id) {
  el.classList.toggle('active');
  if (selectedDisc.has(id)) selectedDisc.delete(id);
  else selectedDisc.add(id);
}

/* ── UTILITAIRES ──────────────────────────────────────────────── */
function clearErr(prefix) {
  const el = document.getElementById(prefix + '-err');
  if (el) el.textContent = '';
}

function setBtn(id, text, disabled) {
  const b = document.getElementById(id);
  b.textContent = text;
  b.disabled    = disabled;
  b.classList.toggle('loading', disabled);
}

function showPendingScreen(email) {
  document.getElementById('auth-tabs').style.display    = 'none';
  document.getElementById('auth-body').style.display    = 'none';
  document.getElementById('pending-screen').style.display = 'block';
  if (email) document.getElementById('pending-email-display').textContent = email;
}

/* ── CONNEXION ─────────────────────────────────────────────────── */
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pwd   = document.getElementById('l-pwd').value;
  const errEl = document.getElementById('l-err');

  if (!email || !pwd) {
    errEl.textContent = 'Remplis les deux champs.';
    return;
  }

  setBtn('btn-login', 'Connexion en cours…', true);
  errEl.textContent = '';

  try {
    const persistence = document.getElementById('l-remember').checked
      ? firebase.auth.Auth.Persistence.LOCAL
      : firebase.auth.Auth.Persistence.SESSION;

    await auth.setPersistence(persistence);
    await auth.signInWithEmailAndPassword(email, pwd);
    // → onAuthStateChanged prend le relais

  } catch(e) {
    setBtn('btn-login', 'Se connecter', false);
    errEl.textContent = friendlyError(e.code);
  }
}

/* ── INSCRIPTION ───────────────────────────────────────────────── */
async function doRegister() {
  const first = document.getElementById('r-first').value.trim();
  const last  = document.getElementById('r-last').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pwd   = document.getElementById('r-pwd').value;
  const errEl = document.getElementById('r-err');

  if (!first || !last) { errEl.textContent = 'Prénom et nom requis.'; return; }
  if (!email)          { errEl.textContent = 'Adresse e-mail requise.'; return; }
  if (pwd.length < 8)  { errEl.textContent = 'Mot de passe : 8 caractères minimum.'; return; }

  setBtn('btn-register', 'Création du compte…', true);
  errEl.textContent = '';

  try {
    const cred    = await auth.createUserWithEmailAndPassword(email, pwd);
    const uid     = cred.user.uid;
    const isAdmin = email.toLowerCase() === ADMIN_EMAIL.toLowerCase();

    // Profil principal (fts_users)
    const profile = {
      email,
      name:        first + ' ' + last,
      firstName:   first,
      lastName:    last,
      role:        isAdmin ? 'admin' : 'member',
      status:      isAdmin ? 'active' : 'pending',
      disciplines: [...selectedDisc],
      createdAt:   Date.now(),
    };
    await db.ref('fts_users/' + uid).set(profile);

    // Synchronisation profil forum (compatibilité forum.html).
    // Avec les règles sécurisées, un compte pending peut ne pas avoir le droit d'écrire ici :
    // ce n'est pas bloquant, l'admin forum lira la demande depuis fts_users puis synchronisera à la validation.
    try {
      await db.ref('fts_forum/users/' + uid).set({
        name:     first + ' ' + last,
        group:    [...selectedDisc].join(', '),
        subgroup: '',
        status:   isAdmin ? 'active' : 'pending',
        role:     isAdmin ? 'admin' : 'member',
        ts:       Date.now(),
      });
    } catch(syncErr) {
      console.warn('[FTS Auth] Synchro forum différée :', syncErr);
    }

    // → onAuthStateChanged prend le relais (pending ou membres.html)

  } catch(e) {
    setBtn('btn-register', 'Créer mon compte', false);
    errEl.textContent = friendlyError(e.code);
  }
}

/* ── MOT DE PASSE OUBLIÉ ───────────────────────────────────────── */
async function doResetPwd() {
  const email = document.getElementById('l-email').value.trim();
  const errEl = document.getElementById('l-err');
  const okEl  = document.getElementById('l-ok');

  if (!email) {
    errEl.textContent = 'Entre ton e-mail ci-dessus, puis reclique ici.';
    document.getElementById('l-email').focus();
    return;
  }

  try {
    await auth.sendPasswordResetEmail(email);
    errEl.textContent = '';
    okEl.textContent  = 'E-mail envoyé ! Vérifie ta boîte mail.';
    okEl.style.display = 'block';
  } catch(e) {
    okEl.style.display = 'none';
    errEl.textContent  = friendlyError(e.code);
  }
}

/* ── DÉCONNEXION ───────────────────────────────────────────────── */
function doSignOut() {
  auth.signOut().then(() => location.reload());
}

/* ── MESSAGES D'ERREUR LISIBLES ────────────────────────────────── */
function friendlyError(code) {
  const map = {
    'auth/invalid-email':          'Adresse e-mail invalide.',
    'auth/user-not-found':         'Aucun compte avec cet e-mail.',
    'auth/wrong-password':         'Mot de passe incorrect.',
    'auth/invalid-credential':     'E-mail ou mot de passe incorrect.',
    'auth/email-already-in-use':   'Un compte existe déjà avec cet e-mail.',
    'auth/weak-password':          'Mot de passe trop faible (8 car. min).',
    'auth/too-many-requests':      'Trop de tentatives. Réessaie dans quelques minutes.',
    'auth/network-request-failed': 'Problème réseau. Vérifie ta connexion.',
    'auth/operation-not-allowed':  'Connexion par e-mail non activée sur Firebase.',
  };
  return map[code] || 'Une erreur est survenue. Réessaie.';
}
</script>

<script src="assets/js/fts-pwa.js?v=14"></script>
<div class="install-bar" id="install-bar">
  <p id="install-msg"></p>
  <button class="btn-install" id="btn-install">Installer</button>
  <button class="btn-close-bar" id="btn-close-bar">✕</button>
</div>
