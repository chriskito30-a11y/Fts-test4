<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Saison — Fais Ton Show</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/fts.css">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
.admin-shell{display:none}.topbar{background:var(--grey2);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}.logo{font-family:var(--font-display);font-size:1.45rem}.logo span{color:var(--red)}.sub{font-size:.65rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}.actions{display:flex;gap:.5rem;flex-wrap:wrap}.btn-sm{width:auto;font-family:var(--font-body);font-size:.76rem;letter-spacing:0;padding:.55rem .9rem}.btn-dark{background:#242424}.btn-dark:hover{background:#303030}.layout{max-width:1100px;margin:0 auto;padding:1.5rem}.grid{display:grid;grid-template-columns:330px 1fr;gap:1rem}.card-admin{background:var(--grey);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem}.mini-title{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}.activity-list{display:flex;flex-direction:column;gap:.45rem;max-height:70vh;overflow:auto}.act-row{display:flex;align-items:center;gap:.6rem;background:#141414;border:1px solid var(--border);border-radius:var(--r-sm);padding:.65rem .75rem;cursor:pointer}.act-row:hover,.act-row.sel{border-color:var(--red);background:rgba(212,32,26,.08)}.act-ico{font-size:1.2rem}.act-info{flex:1;min-width:0}.act-name{font-size:.86rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.act-meta{font-size:.68rem;color:var(--muted);margin-top:.1rem}.status-dot{font-size:.6rem;color:#6aba6a}.status-dot.off{color:#aa6060}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}.field{margin-bottom:.85rem}.field label{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase}.field input,.field textarea,.field select{font-size:.86rem}.field textarea{min-height:70px}.full{grid-column:1/-1}.offer-card{background:#101010;border:1px solid var(--border);border-radius:var(--r-sm);padding:1rem;margin-bottom:.8rem}.offer-head{display:flex;align-items:center;justify-content:space-between;gap:.7rem;margin-bottom:.8rem}.offer-title{font-size:.82rem;color:var(--gold);font-weight:500}.muted-note{font-size:.72rem;color:var(--muted);line-height:1.5}.msg{display:none;margin:.8rem 0;padding:.75rem 1rem;border-radius:var(--r-sm);font-size:.8rem}.msg.ok{display:block;background:rgba(50,120,50,.15);border:1px solid #2a5a2a;color:#6aba6a}.msg.err{display:block;background:rgba(212,32,26,.1);border:1px solid rgba(212,32,26,.3);color:#e07070}.auth-loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}.spinner{width:24px;height:24px;border:2px solid #333;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.danger{border-color:#5a2020;color:#aa6060;background:transparent}.danger:hover{background:rgba(212,32,26,.1);color:var(--red)}.import-area{font-family:monospace;font-size:.74rem;min-height:140px}@media(max-width:820px){.grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.activity-list{max-height:none}.topbar{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body class="has-glow">
<div class="auth-loading" id="auth-loading"><div class="logo">FAIS TON <span>SHOW</span></div><div class="spinner"></div><div class="sub">Vérification accès admin…</div></div>
<div class="admin-shell" id="admin-shell">
  <div class="topbar"><div><div class="logo">ADMIN <span>SAISON</span></div><div class="sub">Tarifs · liens d’inscription · contenus publics</div></div><div class="actions"><a class="btn btn-sm btn-dark" href="admin.html">Admin hub</a><a class="btn btn-sm btn-dark" href="saison.html">Voir la page</a><a class="btn btn-sm btn-dark" href="contenus-admin.html">Admin contenus</a><a class="btn btn-sm btn-dark" href="calendrier-admin.html">Admin calendrier</a><button class="btn btn-sm btn-dark" onclick="exportJson()">Exporter JSON</button><button class="btn btn-sm" onclick="saveAll()">Publier</button><button class="btn-outline" onclick="doLogout()">Déconnexion</button></div></div>
  <div class="layout">
    <div class="grid">
      <div class="card-admin"><div class="mini-title">Activités</div><div class="activity-list" id="activity-list"></div><button class="btn-gold" style="margin-top:.8rem" onclick="addActivity()">+ Ajouter une activité</button><hr class="divider"><div class="mini-title">Import / sauvegarde</div><textarea id="json-area" class="import-area" placeholder="Colle ici un export JSON si besoin…"></textarea><button class="btn-outline" style="width:100%;justify-content:center;margin-top:.5rem" onclick="importJson()">Importer ce JSON</button></div>
      <div class="card-admin">
        <div class="mini-title">Réglages généraux</div>
        <div class="form-grid">
          <div class="field"><label>Titre</label><input id="m-title"></div><div class="field"><label>Saison</label><input id="m-year"></div>
          <div class="field full"><label>Slogan</label><input id="m-slogan"></div><div class="field full"><label>Lien d'inscription par défaut</label><input id="m-link" placeholder="https://www.helloasso.com/..."></div>
        </div>
        <hr class="divider"><div class="mini-title">Activité sélectionnée</div><div id="empty-edit" class="muted-note">Sélectionne une activité à gauche.</div>
        <div id="editor" style="display:none">
          <div class="form-grid">
            <div class="field"><label>Nom</label><input id="a-name"></div><div class="field"><label>Icône</label><input id="a-icon"></div>
            <div class="field"><label>Sous-titre</label><input id="a-subtitle"></div><div class="field"><label>Badge</label><input id="a-badge" placeholder="Offert, Nouveau…"></div>
            <div class="field"><label>Ordre</label><input id="a-order" type="number"></div><div class="field"><label>Visible</label><select id="a-active"><option value="true">Oui</option><option value="false">Non</option></select></div>
          </div>
          <div class="mini-title">Formules / cases tarifs et inscription</div><div id="offers"></div>
          <div class="actions"><button class="btn-gold" onclick="addOffer()">+ Ajouter une formule</button><button class="btn-outline danger" onclick="deleteActivity()">Supprimer l'activité</button></div>
        </div>
        <div id="msg" class="msg"></div>
      </div>
    </div>
  </div>
</div>
<script src="assets/js/fts-utils.js"></script>
<script src="assets/js/fts-firebase.js"></script>
<script>
const DEFAULT_SAISON={meta:{eyebrow:"Association culturelle",title:"SAISON",year:"2026/2027",slogan:"Deux parcours, une passion — trouvez votre place sur scène"},parcoursIntro:[{key:"loisir",icon:"🎈",tag:"Parcours Loisir",title:"À ton rythme",desc:"1 cours hebdomadaire pour découvrir, s'amuser et progresser librement."},{key:"perf",icon:"🚀",tag:"Parcours Performance",title:"Aller plus loin",desc:"Plus de technique, plusieurs spectacles dans l'année — et l'Atelier Improvisation offert toute l'année."}],inscriptionDefault:"",items:[]};
let db,auth,saison=JSON.parse(JSON.stringify(DEFAULT_SAISON)),selectedIndex=0;
const FALLBACK_ITEMS=[
{id:"theatre",active:true,order:10,icon:"🎭",name:"Théâtre",subtitle:"Mercredi · Lundi",badge:"",offers:[{key:"loisir",label:"🎈 Loisir",style:"loisir",main:"1 cours hebdomadaire le <strong>mercredi</strong>.",bullets:["Plusieurs ateliers de théâtre dans la saison inclus","Plusieurs ateliers d'expression corporelle inclus"],price:"270€",priceNote:"Tarif saison",link:""},{key:"perf",label:"🚀 Performance",style:"perf",main:"1 cours hebdomadaire le <strong>mercredi</strong> + entraînements supplémentaires.",bullets:["Nouveau : entraînement jeudi dès octobre","Atelier Improvisation offert toute l'année"],price:"",priceNote:"Tarif à compléter",link:""}]},
{id:"danse",active:true,order:20,icon:"💃",name:"Danse",subtitle:"Mardi · Jeudi",badge:"",offers:[{key:"loisir",label:"🎈 Loisir",style:"loisir",main:"1 cours hebdomadaire. Groupes : Baby Show, Junior, Ados/Adultes.",bullets:[],price:"180€ / 200€",priceNote:"Enfants : 180€ · Adultes : 200€",link:""}]},
{id:"musique",active:true,order:30,icon:"🎸",name:"Musique & Chant",subtitle:"Individuel + ateliers",badge:"",offers:[{key:"loisir",label:"🎈 Loisir",style:"loisir",main:"1 cours individuel hebdomadaire.",bullets:[],price:"500€",priceNote:"Instrumental / chant + cours individuels",link:""}]},
{id:"singer",active:true,order:40,icon:"🎶",name:"Singer Academy",subtitle:"Vendredi · Mercredi",badge:"",offers:[{key:"loisir",label:"🎈 Loisir",style:"loisir",main:"1 cours de base le vendredi soir.",bullets:[],price:"270€",priceNote:"Tarif saison",link:""}]},
{id:"comedie",active:true,order:50,icon:"🎬",name:"Comédie Musicale",subtitle:"Tous âges",badge:"",offers:[{key:"loisir",label:"🎭 Kids / Loisir",style:"loisir",main:"1 cours hebdomadaire adapté à l'âge.",bullets:[],price:"350€",priceNote:"Tarif saison",link:""}]},
{id:"formation",active:true,order:70,icon:"🎼",name:"Formation Musicale",subtitle:"Option Musique & Chant",badge:"",offers:[{key:"option",label:"🎼 Option",style:"option",main:"Option payante en supplément, réservée aux élèves déjà inscrits en Musique & Chant.",bullets:[],price:"150€",priceNote:"Tarif saison",link:""}]},
{id:"atelier",active:true,order:80,icon:"🎨",name:"Atelier Créatif",subtitle:"Inclus Performance",badge:"Offert",offers:[{key:"inclus",label:"🎁 Inclus",style:"option",main:"Inclus automatiquement dans tous les Parcours Performance.",bullets:["Offert toute l'année pour tous les élèves Performance"],price:"160€",priceNote:"Tarif atelier seul — offert en Performance",link:""}]}
];
function ensureData(){if(!saison.items||!saison.items.length)saison.items=JSON.parse(JSON.stringify(FALLBACK_ITEMS));}
function init(){db=FTS.initFirebase();auth=firebase.auth();auth.onAuthStateChanged(async user=>{if(!user){location.href='auth.html';return}const snap=await db.ref('fts_users/'+user.uid).once('value');const profile=snap.val();if(!profile||profile.role!=='admin'){location.href='membres.html';return}document.getElementById('auth-loading').style.display='none';document.getElementById('admin-shell').style.display='block';await load();});}
async function load(){const snap=await db.ref('fts_saison/config').once('value');if(snap.val())saison=snap.val();ensureData();bindMeta();renderList();selectActivity(0)}
function bindMeta(){document.getElementById('m-title').value=saison.meta?.title||'';document.getElementById('m-year').value=saison.meta?.year||'';document.getElementById('m-slogan').value=saison.meta?.slogan||'';document.getElementById('m-link').value=saison.inscriptionDefault||'';['m-title','m-year','m-slogan','m-link'].forEach(id=>document.getElementById(id).oninput=readMeta)}
function readMeta(){saison.meta=saison.meta||{};saison.meta.title=document.getElementById('m-title').value;saison.meta.year=document.getElementById('m-year').value;saison.meta.slogan=document.getElementById('m-slogan').value;saison.inscriptionDefault=document.getElementById('m-link').value}
function sortedItems(){return saison.items.map((it,i)=>({...it,_i:i})).sort((a,b)=>(+a.order||0)-(+b.order||0))}
function renderList(){document.getElementById('activity-list').innerHTML=sortedItems().map(it=>`<div class="act-row ${it._i===selectedIndex?'sel':''}" onclick="selectActivity(${it._i})"><div class="act-ico">${FTS.esc(it.icon||'🎭')}</div><div class="act-info"><div class="act-name">${FTS.esc(it.name||'Sans titre')}</div><div class="act-meta">${FTS.esc(it.subtitle||'')} · ${it.offers?.length||0} formule(s)</div></div><div class="status-dot ${it.active===false?'off':''}">●</div></div>`).join('')}
function selectActivity(i){selectedIndex=i;renderList();const a=saison.items[i];document.getElementById('empty-edit').style.display=a?'none':'block';document.getElementById('editor').style.display=a?'block':'none';if(!a)return;document.getElementById('a-name').value=a.name||'';document.getElementById('a-icon').value=a.icon||'';document.getElementById('a-subtitle').value=a.subtitle||'';document.getElementById('a-badge').value=a.badge||'';document.getElementById('a-order').value=a.order||0;document.getElementById('a-active').value=String(a.active!==false);['a-name','a-icon','a-subtitle','a-badge','a-order','a-active'].forEach(id=>document.getElementById(id).oninput=readActivity);renderOffers()}
function readActivity(){const a=saison.items[selectedIndex];if(!a)return;a.name=document.getElementById('a-name').value;a.icon=document.getElementById('a-icon').value;a.subtitle=document.getElementById('a-subtitle').value;a.badge=document.getElementById('a-badge').value;a.order=Number(document.getElementById('a-order').value||0);a.active=document.getElementById('a-active').value==='true';renderList()}
function renderOffers(){const a=saison.items[selectedIndex];document.getElementById('offers').innerHTML=(a.offers||[]).map((o,idx)=>`<div class="offer-card"><div class="offer-head"><div class="offer-title">Formule ${idx+1}</div><button class="btn-outline danger" onclick="deleteOffer(${idx})">Supprimer</button></div><div class="form-grid"><div class="field"><label>Clé</label><input value="${FTS.esc(o.key||'')}" oninput="setOffer(${idx},'key',this.value)"></div><div class="field"><label>Libellé onglet</label><input value="${FTS.esc(o.label||'')}" oninput="setOffer(${idx},'label',this.value)"></div><div class="field"><label>Style</label><select onchange="setOffer(${idx},'style',this.value)"><option ${o.style==='loisir'?'selected':''} value="loisir">Loisir</option><option ${o.style==='perf'?'selected':''} value="perf">Performance</option><option ${o.style==='option'?'selected':''} value="option">Option</option></select></div><div class="field"><label>Tarif</label><input value="${FTS.esc(o.price||'')}" oninput="setOffer(${idx},'price',this.value)" placeholder="270€, 180€ / 200€…"></div><div class="field full"><label>Lien inscription</label><input value="${FTS.esc(o.link||'')}" oninput="setOffer(${idx},'link',this.value)" placeholder="Vide = lien par défaut"></div><div class="field full"><label>Description principale</label><textarea oninput="setOffer(${idx},'main',this.value)">${FTS.esc(o.main||'')}</textarea></div><div class="field full"><label>Cases / lignes incluses — une par ligne</label><textarea oninput="setOfferBullets(${idx},this.value)">${FTS.esc((o.bullets||[]).join('\n'))}</textarea></div><div class="field full"><label>Note tarif</label><input value="${FTS.esc(o.priceNote||'')}" oninput="setOffer(${idx},'priceNote',this.value)"></div></div></div>`).join('')}
function setOffer(i,k,v){saison.items[selectedIndex].offers[i][k]=v}
function setOfferBullets(i,v){saison.items[selectedIndex].offers[i].bullets=v.split('\n').map(x=>x.trim()).filter(Boolean)}
function addOffer(){const a=saison.items[selectedIndex];a.offers=a.offers||[];a.offers.push({key:'nouvelle',label:'Nouvelle formule',style:'option',main:'',bullets:[],price:'',priceNote:'',link:''});renderOffers();renderList()}
function deleteOffer(i){if(!confirm('Supprimer cette formule ?'))return;saison.items[selectedIndex].offers.splice(i,1);renderOffers();renderList()}
function addActivity(){saison.items.push({id:'activite_'+Date.now(),active:true,order:99,icon:'🎭',name:'Nouvelle activité',subtitle:'',badge:'',offers:[{key:'formule',label:'Formule',style:'option',main:'',bullets:[],price:'',priceNote:'',link:''}]});selectActivity(saison.items.length-1)}
function deleteActivity(){if(!confirm('Supprimer cette activité ?'))return;saison.items.splice(selectedIndex,1);selectedIndex=0;renderList();selectActivity(0)}
async function saveAll(){try{readMeta();readActivity();await db.ref('fts_saison/config').set({...saison,updatedAt:Date.now()});showMsg('ok','Saison publiée. La page publique se mettra à jour automatiquement.')}catch(e){showMsg('err','Erreur publication : '+e.message)}}
function exportJson(){readMeta();document.getElementById('json-area').value=JSON.stringify(saison,null,2);showMsg('ok','Export JSON généré.')}function importJson(){try{saison=JSON.parse(document.getElementById('json-area').value);ensureData();bindMeta();renderList();selectActivity(0);showMsg('ok','JSON importé. Clique sur Publier pour l’envoyer en ligne.')}catch(e){showMsg('err','JSON invalide : '+e.message)}}
function showMsg(cls,txt){const m=document.getElementById('msg');m.className='msg '+cls;m.textContent=txt;setTimeout(()=>m.className='msg',4500)}function doLogout(){firebase.auth().signOut().then(()=>location.href='auth.html')}
init();
</script>
</body>
</html>
